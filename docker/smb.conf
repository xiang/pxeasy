[global]
    workgroup = WORKGROUP
    server string = Samba Server
    netbios name = SAMBA
    security = user
    map to guest = Bad User
    guest account = nobody
    dns proxy = no
    log level = 3
    log file = /dev/null
    max log size = 0
    passdb backend = tdbsam

[public]
    comment = Public Share
    path = /share
    browsable = yes
    writable = yes
    guest ok = yes
    read only = no
    force user = nobody

[windows]
    comment = Windows ISO Share
    path = /mnt/windows
    browsable = yes
    writable = no
    guest ok = yes
    read only = yes
    force user = nobody
    force group = nobody
    # Mimic a read-only ISO environment
    nt acl support = no
    acl check permissions = no
    map acl inherit = no
    locking = no
    strict locking = no
    # Force attributes that Windows installer expects
    map archive = no
    map system = no
    map hidden = no
    # Ensure any attempt to open with write access is denied early or ignored
    csc policy = disable
    fake directory create times = yes
    # Allow execution regardless of POSIX bits
    acl allow execute always = yes
